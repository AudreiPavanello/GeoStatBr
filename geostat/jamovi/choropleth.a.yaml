---
name:      choropleth
title:     Choropleth Map
menuGroup: Geospatial
menuSubgroup: Maps
menuTitle: Choropleth Map
version:   '1.0.0'
jas:       '1.2'

description:
    main: >
        Create a choropleth map using Brazilian geographic data.
        Color-shades regions by a numeric variable.

completeWhenFilled: true

options:
    - name: data
      type: Data

    - name: var
      title: Variable
      type: Variable
      suggested:
          - continuous
      permitted:
          - numeric

    - name: joinVar
      title: Region Code Column
      type: Variable
      description: >
          Column in your data containing the region identifier
          (e.g., 2-digit state code for states, 7-digit IBGE code
          for municipalities).
      permitted:
          - numeric
          - factor
          - id

    - name: geoLevel
      title: Geographic Level
      type: List
      options:
          - title: Brazilian States
            name: states
          - title: "Paraná Municipalities"
            name: mun_pr
      default: states

    - name: classMethod
      title: Classification Method
      type: List
      options:
          - title: Quantile
            name: quantile
          - title: Jenks Natural Breaks
            name: jenks
          - title: Equal Interval
            name: equal
          - title: Standard Deviation
            name: sd
      default: quantile

    - name: nClasses
      title: Number of Classes
      type: Integer
      default: 5
      min: 3
      max: 9

    - name: mapTitle
      title: Map Title
      type: String
      default: ''

    - name: showWarnings
      title: Show warnings
      type: Bool
      default: true
      hidden: true
...
