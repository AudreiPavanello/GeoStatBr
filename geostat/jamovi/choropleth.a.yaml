---
name:      choropleth
title:     Choropleth Map
menuGroup: Geospatial
menuSubgroup: Maps
menuTitle: Choropleth Map
version:   '1.0.0'
jas:       '1.2'

description:
    main: >
        Create a choropleth map using Brazilian geographic data.
        Color-shades regions by a numeric variable.

completeWhenFilled: true

options:
    - name: data
      type: Data

    - name: var
      title: Variable
      type: Variable
      suggested:
          - continuous
      permitted:
          - numeric

    - name: joinVar
      title: Region Code Column
      type: Variable
      description: >
          Column in your data containing the region identifier
          (e.g., 2-digit state code for states, 7-digit IBGE code
          for municipalities).
      permitted:
          - numeric
          - factor
          - id

    - name: geoLevel
      title: Geographic Level
      type: List
      options:
          - title: Brazilian States
            name: states
          - title: "Acre Municipalities"
            name: mun_ac
          - title: "Alagoas Municipalities"
            name: mun_al
          - title: "Amapá Municipalities"
            name: mun_ap
          - title: "Amazonas Municipalities"
            name: mun_am
          - title: "Bahia Municipalities"
            name: mun_ba
          - title: "Ceará Municipalities"
            name: mun_ce
          - title: "Distrito Federal Municipalities"
            name: mun_df
          - title: "Espírito Santo Municipalities"
            name: mun_es
          - title: "Goiás Municipalities"
            name: mun_go
          - title: "Maranhão Municipalities"
            name: mun_ma
          - title: "Mato Grosso Municipalities"
            name: mun_mt
          - title: "Mato Grosso do Sul Municipalities"
            name: mun_ms
          - title: "Minas Gerais Municipalities"
            name: mun_mg
          - title: "Pará Municipalities"
            name: mun_pa
          - title: "Paraíba Municipalities"
            name: mun_pb
          - title: "Paraná Municipalities"
            name: mun_pr
          - title: "Pernambuco Municipalities"
            name: mun_pe
          - title: "Piauí Municipalities"
            name: mun_pi
          - title: "Rio de Janeiro Municipalities"
            name: mun_rj
          - title: "Rio Grande do Norte Municipalities"
            name: mun_rn
          - title: "Rio Grande do Sul Municipalities"
            name: mun_rs
          - title: "Rondônia Municipalities"
            name: mun_ro
          - title: "Roraima Municipalities"
            name: mun_rr
          - title: "Santa Catarina Municipalities"
            name: mun_sc
          - title: "São Paulo Municipalities"
            name: mun_sp
          - title: "Sergipe Municipalities"
            name: mun_se
          - title: "Tocantins Municipalities"
            name: mun_to
      default: states

    - name: classMethod
      title: Classification Method
      type: List
      options:
          - title: Quantile
            name: quantile
          - title: Jenks Natural Breaks
            name: jenks
          - title: Equal Interval
            name: equal
          - title: Standard Deviation
            name: sd
      default: quantile

    - name: nClasses
      title: Number of Classes
      type: Integer
      default: 5
      min: 3
      max: 9

    - name: mapTitle
      title: Map Title
      type: String
      default: ''

    - name: showWarnings
      title: Show warnings
      type: Bool
      default: true
      hidden: true
...
