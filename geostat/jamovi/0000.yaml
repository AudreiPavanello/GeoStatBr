analyses:
  - title: Choropleth Map
    name: choropleth
    ns: geostatbr
    menuGroup: Geospatial
    menuSubgroup: Maps
    menuTitle: Choropleth Map
    description: >
      Create a choropleth map using Brazilian geographic data. Color-shades
      regions by a numeric variable.
    category: analyses
  - title: Global Moran's I
    name: morantest
    ns: geostatbr
    menuGroup: Geospatial
    menuSubgroup: Spatial Autocorrelation
    menuTitle: Global Moran's I
    description: >
      Test for global spatial autocorrelation. Reports the Moran's I statistic,
      its expected value, variance, and p-value.
    category: analyses
  - title: Local Moran's I (LISA)
    name: localmorantest
    ns: geostatbr
    menuGroup: Geospatial
    menuSubgroup: Spatial Autocorrelation
    menuTitle: Local Moran's I (LISA)
    description: >
      Identify local spatial clusters (High-High, Low-Low) and spatial outliers
      (High-Low, Low-High) using LISA statistics.
    category: analyses
